<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ADRAH — Assistance • Dépannage • Remorquage</title>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">

  <style>
    :root{
      --bg:#05070b;
      --muted:#9ca3b5;
      --text:#fff;
    }

    *{box-sizing:border-box;}

    body{
      margin:0;
      font-family:Inter,sans-serif;
      background:#000;
      color:var(--text);
    }

    .app{
      max-width:560px;
      margin:auto;
      padding:22px;
    }

    .top-logo{
      display:flex;
      justify-content:center;
      margin-bottom:20px;
    }

    .main-logo{
      width:90%;
      max-width:420px;
    }

    .search{
      display:flex;
      position:relative;
      margin:24px 0;
    }

    .search input{
      width:100%;
      height:64px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(18,20,28,.92);
      color:#fff;
      text-align:center;
      font-size:18px;
      outline:none;
    }

    .grid{display:grid;gap:16px;}

    .card{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:20px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(20,20,30,.6);
      cursor:pointer;
    }

    .results.hidden{display:none;}

    .drawer{
      position:fixed;
      top:0;right:0;
      width:min(420px,92vw);
      height:100%;
      background:#111;
      transform:translateX(100%);
      transition:.25s;
      z-index:999;
    }

    .drawer.show{transform:translateX(0);}
  </style>
</head>

<body>

<div class="app">

  <!-- LOGO -->
  <header class="top-logo">
    <img src="logo.jpg" class="main-logo" alt="ADRAH">
  </header>

  <div style="text-align:center;margin-bottom:10px;">
    Assistance • Dépannage • Remorquage
  </div>

  <!-- SEARCH -->
  <div class="search">
    <input id="q" type="search" placeholder="Rechercher...">
  </div>

  <!-- CATÉGORIES -->
  <section>
    <h2 id="secretTrigger" style="font-size:14px;color:#bfc6d4;">
      CATÉGORIES
    </h2>

    <div class="grid" id="cats"></div>
  </section>

  <!-- RESULTS -->
  <section id="results" class="results hidden">
    <div id="list"></div>
  </section>

  <!-- RETOUR -->
  <button id="backTop" class="hidden">Retour</button>

</div>

<!-- DRAWER DETAIL -->
<aside class="drawer" id="drawer">
  <div style="padding:20px">
    <div id="d-name"></div>
    <div id="d-tel"></div>
  </div>
</aside>

<!-- MENU SECRET -->
<aside class="drawer" id="secretDrawer">
  <div style="padding:20px">
    <h3>MENU SECRET</h3>
    <div id="secretBody"></div>
  </div>
</aside>

<script>
const CATEGORIES = [
  { key:'VL', label:'VL', sub:'VL' },
  { key:'PL', label:'PL', sub:'PL' }
];

let DATA = [];
let current = [];

/* CATEGORIES */
const cats = document.getElementById('cats');

cats.innerHTML = CATEGORIES.map(c => `
  <div class="card" data-cat="${c.key}">
    <div>
      <b>${c.label}</b><br>
      <small>${c.sub}</small>
    </div>
  </div>
`).join('');

/* JSON */
fetch('data.json')
.then(r => r.json())
.then(json => DATA = json);

/* SEARCH */
function search(v){
  const res = DATA.filter(x =>
    JSON.stringify(x).toLowerCase().includes(v.toLowerCase())
  );
  current = res;
  document.getElementById('results').classList.remove('hidden');
  document.getElementById('list').innerHTML =
    res.map(r => `<div class="card">${r.nom}</div>`).join('');
}

document.getElementById('q').addEventListener('input', e=>{
  search(e.target.value);
});

/* CLIC CAT */
cats.addEventListener('click', e=>{
  const cat = e.target.closest('[data-cat]');
  if(!cat) return;

  const key = cat.dataset.cat;
  const res = DATA.filter(x => x.categorie === key);

  current = res;
  document.getElementById('results').classList.remove('hidden');
  document.getElementById('list').innerHTML =
    res.map(r => `<div class="card">${r.nom}</div>`).join('');
});

/* MENU SECRET */
let count = 0;
document.getElementById('secretTrigger').onclick = ()=>{
  count++;
  if(count >= 3){
    count = 0;
    document.getElementById('secretDrawer').classList.add('show');
  }
};
</script>

</body>
</html>
