<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ADRAH</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<header class="top-logo">
  <img src="logo.jpg" class="main-logo">
</header>

<div class="search">
  <input id="q" type="search" placeholder="Rechercher..." />
</div>

<section>
  <h2 id="secretTrigger">CATÉGORIES</h2>
  <div class="grid" id="cats"></div>
</section>

<button id="backTop" class="back-top hidden">Retour</button>

<section class="results hidden" id="results">
  <div class="results-head">
    <strong id="count"></strong>
    <span id="hint"></span>
  </div>
  <div class="list" id="list"></div>
</section>

</div>

<!-- DRAWER -->
<aside class="drawer" id="drawer">
  <header class="drawer-header">
    <div class="title">
      <img id="d-logo">
      <div>
        <div id="d-name"></div>
        <div id="d-cat"></div>
      </div>
    </div>
    <button id="d-close-top">✕</button>
  </header>

  <div class="body">
    <a id="d-call" class="btn-call">
      <i class="ph ph-phone"></i>
      <div>
        <div>Appeler</div>
        <div id="d-tel"></div>
      </div>
    </a>

    <div id="d-type"></div>
    <div id="d-assist"></div>
    <div id="d-extra"></div>
  </div>
</aside>

<!-- SECRET -->
<aside class="drawer" id="secretDrawer">
  <div class="body" id="secretBody"></div>
</aside>

<script src="app.js"></script>
</body>
</html>
