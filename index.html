<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ADRAH Assistance</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">

<style>

:root{

--bg:#0b1220;
--panel:#121b2d;
--panel2:#1a2740;
--blue:#1f8fff;
--blue2:#4bb3ff;
--text:#ffffff;
--muted:#9ba7bd;

}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{

background:
linear-gradient(rgba(5,10,20,.92),rgba(5,10,20,.95)),
url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1600&auto=format&fit=crop');

background-size:cover;
background-attachment:fixed;

color:var(--text);

padding:20px;

}

.header{

margin-bottom:20px;

}

.logo{

font-size:42px;
font-weight:700;

}

.logo span{

color:var(--blue);

}

.sub{

margin-top:5px;

color:var(--muted);

}

.search{

margin-top:20px;

position:relative;

}

.search input{

width:100%;

height:56px;

border:none;

outline:none;

border-radius:18px;

padding:0 20px 0 55px;

background:var(--panel);

color:white;

font-size:17px;

border:1px solid #223352;

}

.search i{

position:absolute;

left:18px;
top:18px;

font-size:20px;

color:var(--muted);

}

.tabs{

display:flex;

gap:10px;

overflow:auto;

margin-top:20px;
margin-bottom:20px;

}

.tab{

background:var(--panel);

border:1px solid #284066;

padding:14px 18px;

border-radius:16px;

cursor:pointer;

white-space:nowrap;

font-weight:600;

transition:.2s;

}

.tab:hover{

background:var(--blue);

}

.results{

display:flex;

flex-direction:column;

gap:14px;

}

.card{

background:rgba(16,24,40,.95);

border:1px solid #253654;

border-radius:24px;

padding:18px;

}

.name{

font-size:22px;

font-weight:700;

}

.meta{

margin-top:6px;

color:var(--muted);

font-size:14px;

}

.phone{

margin-top:14px;

font-size:28px;

font-weight:700;

}

.call{

display:flex;

justify-content:center;

align-items:center;

gap:10px;

margin-top:16px;

height:52px;

border-radius:16px;

text-decoration:none;

color:white;

font-weight:700;

font-size:18px;

background:linear-gradient(90deg,var(--blue),var(--blue2));

}

.empty{

text-align:center;

padding:40px;

color:var(--muted);

}

</style>
</head>

<body>

<div class="header">

<div class="logo">
<span>A</span>DRAH
</div>

<div class="sub">
Assistance • Dépannage • Remorquage
</div>

</div>

<div class="search">

<i class="ph ph-magnifying-glass"></i>

<input
id="search"
type="text"
placeholder="Recherche : BMW, AXA, IVECO..."
>

</div>

<div class="tabs">

<div class="tab" onclick="filterCat('ALL')">
🌍 TOUT
</div>

<div class="tab" onclick="filterCat('VL')">
🚗 VL
</div>

<div class="tab" onclick="filterCat('PL')">
🚛 PL
</div>

<div class="tab" onclick="filterCat('MOTO')">
🏍️ MOTO
</div>

<div class="tab" onclick="filterCat('ASSURANCE')">
🛡️ ASSURANCE
</div>

</div>

<div
class="results"
id="results"
>

<div class="empty">
Chargement...
</div>

</div>

<script>

let DATA = [];

let CURRENT = 'ALL';

fetch('data.json')

.then(response => response.json())

.then(json => {

DATA = json.map(x => ({

nom: x.nom || '',

categorie: x.categorie || '',

assisteur: x.assisteur || '',

telephone: x.telephone || ''

}));

render();

})

.catch(error => {

document.getElementById('results').innerHTML = `

<div class="empty">

Erreur chargement data.json

</div>

`;

console.error(error);

});

function filterCat(cat){

CURRENT = cat;

render();

}

function render(){

const q = document
.getElementById('search')
.value
.toLowerCase();

let filtered = DATA.filter(item => {

const text = `

${item.nom}
${item.categorie}
${item.assisteur}
${item.telephone}

`.toLowerCase();

return text.includes(q);

});

if(CURRENT !== 'ALL'){

filtered = filtered.filter(item =>
item.categorie === CURRENT
);

}

const results =
document.getElementById('results');

if(filtered.length === 0){

results.innerHTML = `

<div class="empty">

Aucun résultat

</div>

`;

return;

}

results.innerHTML = filtered.map(item => `

<div class="card">

<div class="name">

${item.nom}

</div>

<div class="meta">

${item.assisteur}
•
${item.categorie}

</div>

<div class="phone">

${item.telephone}

</div>

<a
class="call"
href="tel:${item.telephone.replace(/\s/g,'')}">

<i class="ph ph-phone"></i>

APPELER

</a>

</div>

`).join('');

}

document
.getElementById('search')
.addEventListener('input', render);

</script>

</body>
</html>
