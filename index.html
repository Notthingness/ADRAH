<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ADRAH — Assistance • Dépannage • Remorquage</title>

  <!-- Police et icônes -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">

  <style>
    :root{
  --bg:#05070b;
  --panel:rgba(18,20,28,.88);
  --panel-2:rgba(28,32,42,.92);
  --muted:#9ca3b5;
  --text:#ffffff;
  --accent:#e01919;
  --accent-2:#ff3434;
}

*{
  box-sizing:border-box;
}

html,body{
  height:100%;
}

body{
  margin:0;
  color:var(--text);
  font-family:Inter,system-ui,sans-serif;

  background:
  linear-gradient(rgba(0,0,0,.82),rgba(0,0,0,.88)),
  url('https://images.unsplash.com/photo-1511919884226-fd3cad34687c?q=80&w=1600&auto=format&fit=crop');

  background-size:cover;
  background-position:center;
  background-attachment:fixed;

  -webkit-font-smoothing:antialiased;
}

.app{
  max-width:560px;
  margin:auto;
  padding:22px;
}

header{
  margin-bottom:20px;
}

.brand{
  display:flex;
  align-items:center;
  gap:18px;
}

.brand-logo{
  width:95px;
  height:95px;
  border-radius:26px;

  background:
  linear-gradient(145deg,#181d29,#090c13);

  border:1px solid rgba(255,255,255,.08);

  box-shadow:
  0 12px 35px rgba(0,0,0,.45);

  position:relative;
  overflow:hidden;
}

.brand-logo::after{
  content:"";
  position:absolute;
  inset:-20% -50% auto;

  height:160%;

  background:
  conic-gradient(
    from 200deg at 50% 50%,
    transparent 0 20%,
    rgba(255,255,255,.08) 20% 40%,
    transparent 40% 100%
  );

  transform:rotate(-10deg);
}

.brand-title{
  line-height:1;
}

.brand-title h1{
  margin:0;
  font-size:48px;
  font-weight:800;
  color:#1e5eff;
}

.brand-title small{
  display:block;
  margin-top:6px;
  color:#d7dbe5;
  font-size:16px;
}

.search{
  display:flex;
  gap:10px;
  margin:24px 0;
  position:relative;
}

.search input{
  width:100%;
  height:64px;

  background:rgba(18,20,28,.92);

  border:1px solid rgba(255,255,255,.08);

  border-radius:20px;

  color:white;

  padding:0 18px 0 56px;

  font-size:18px;

  outline:none;

  backdrop-filter:blur(10px);
}

 .search input::placeholder{
   color:#8f97aa;
 }  
    
.search input:focus{
  border-color:#ff2d2d;

  box-shadow:
  0 0 0 4px rgba(255,0,0,.12);
}

.search .ico{
  position:absolute;
  left:18px;
  top:50%;
  transform:translateY(-50%);
}

.search .ico i{
  font-size:22px;
  color:#b7bcc8;
}

.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:16px;
}

.card{
  display:flex;
  align-items:center;
  gap:18px;

  width:100%;
  min-width:0;

  min-height:110px;

  padding:20px;

  border-radius:24px;

  border:1px solid rgba(255,255,255,.08);

  overflow:hidden;

  position:relative;

  background:
  linear-gradient(rgba(0,0,0,.72),rgba(0,0,0,.78)),
  url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1200&auto=format&fit=crop');

  background-size:cover;
  background-position:center;

  backdrop-filter:blur(8px);

  transition:.2s;
}

.card:hover{
  transform:translateY(-3px);

  border-color:#ff2d2d;

  box-shadow:
  0 12px 30px rgba(0,0,0,.45);
}

.card i{
  font-size:40px;
  color:#1e5eff;
}

.card h3{
  margin:0;
  font-size:34px;
  font-weight:800;
  color:#1e5eff;
}

.card span{
  color:#e0e3ea;
  font-size:16px;
}
    
.card::before{

  content:"";

  position:absolute;

  inset:0;

  background:

  linear-gradient(

    180deg,

    rgba(255,255,255,.04),

    rgba(255,255,255,0)

  );
  pointer-events:none;  
 }
    
.meta{
  min-width:0;
}    
    
 .card div{
  min-width:0;
}

.card h3,
.card span{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
    
.card span{
  display:block;
}    
    
.badge{
  position:absolute;

  top:18px;
  right:18px;

  background:rgba(255,255,255,.08);

  border:1px solid rgba(255,255,255,.1);

  color:white;

  border-radius:999px;

  padding:6px 14px;

  font-size:14px;
}

.results{
  margin-top:24px;

  background:rgba(14,16,22,.9);

  border:1px solid rgba(255,255,255,.06);

  border-radius:24px;

  overflow:hidden;

  backdrop-filter:blur(12px);
}

.results-head{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:16px;

  border-bottom:1px solid rgba(255,255,255,.05);
}

.results-head strong{
  font-size:15px;
}

.list{
  display:flex;
  flex-direction:column;
}

.row{
  overflow:hidden;
  transition:.18s;
  display:grid;
  grid-template-columns:1fr auto;

  gap:10px;

  align-items:center;

  padding:18px;

  border-bottom:1px solid rgba(255,255,255,.04);
  
}
.row:hover{

  background:rgba(255,255,255,.04);

}
.row:last-child{
  border-bottom:none;
}

.row .title{
  font-size:20px;
  font-weight:700;

  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.row .sub{
  font-size:14px;
  color:#b7bcc8;
}

.actions{
  align-items:center;
  display:flex;
  gap:10px;
}

.btn{
  border:none;
  cursor:pointer;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:18px;

  font-weight:700;
}

a{
  text-decoration:none;
  -webkit-tap-highlight-color:transparent;
}

.btn-call{

  background:
  linear-gradient(180deg,#ff3434,#d70000);

  color:black;

  display:flex;
  align-items:center;
  justify-content:center;

  box-shadow:
  0 10px 20px rgba(255,0,0,.25);
}
    
.list .btn-call{

  width:52px;
  height:52px;

  border-radius:50%;

  padding:0;
}
    
html,body{
  width:100%;
  overflow-x:hidden;
}
    
.drawer .body{
  padding:20px;

  display:flex;
  flex-direction:column;
  gap:14px;

  overflow-y:auto;  
} 
    
.drawer .btn-call{
  width:100%;
  min-height:64px;

  border-radius:18px;

  color:white;

  display:flex;
  align-items:center;
  gap:12px;

  padding:14px 16px;

  text-align:left;

  overflow:hidden;
}

.drawer .btn-call i{
  font-size:22px;
  flex-shrink:0;
}
    
#d-call{
  min-width:0;
}
    
#d-call .call-label{
  font-size:14px;
}

#d-tel{
  display:block;

  width:100%;
  min-width:0;
  max-width:100%;

  font-size:16px;
  line-height:1.4;

  white-space:normal;

  overflow-wrap:anywhere;
  word-break:break-word;
}
         
.call-text{
  flex:1;
  min-width:0;

  display:flex;
  flex-direction:column;
}
        
.btn-ghost{

  width:50px;
  height:50px;

  background:rgba(255,255,255,.06);

  color:white;

  border:1px solid rgba(255,255,255,.08);
}

.btn-ghost.on{

  background:#1e5eff;

  color:white;

  border-color:#1e5eff;
}

.drawer{
  position:fixed;

  top:0;
  right:0;

  width:min(420px,92vw);
  height:100%;

  background:
  linear-gradient(rgba(10,10,10,.94),rgba(10,10,10,.96)),
  url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1200&auto=format&fit=crop');

  background-size:cover;

  border-left:1px solid rgba(255,255,255,.08);

  transform:translateX(100%);

  transition:.25s;

  z-index:999;

  display:flex;
  flex-direction:column;
}

.drawer.show{
  transform:translateX(0);
}

.drawer header{
  padding:20px;

  border-bottom:1px solid rgba(255,255,255,.05);
}

.drawer .title{
  display:flex;
  align-items:center;
  gap:14px;
}
    
.drawer .body *{
  min-width:0;
}
    
.drawer .title img{
  width:52px;
  height:52px;

  border-radius:14px;

  background:#1a1c22;

  border:1px solid rgba(255,255,255,.08);
}
    
.kv{
  background:rgba(255,255,255,.04);

  border:1px solid rgba(255,255,255,.06);

  border-radius:18px;

  padding:14px;
}

.kv b{
  display:block;

  margin-bottom:6px;

  color:#b8becc;

  font-size:12px;
}

.kv span{
  font-size:15px;
}

.hidden{
  display:none;
}

.muted{
  color:var(--muted);
}
    
</style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="brand-title">
          <h1>ADRAH</h1>
          <small>Assistance • Dépannage • Remorquage</small>
        </div>
      </div>
    </header>

    <div class="search">
      <div class="ico"><i class="ph ph-magnifying-glass"></i></div>
      <input id="q" type="search" placeholder="Rechercher" autocomplete="off" />
    </div>

    <section>
      <h2 style="margin:0 0 10px 2px;font-size:14px;color:#bfc6d4;letter-spacing:.3px">CATÉGORIES</h2>
      <div class="grid" id="cats">
        <!-- Catégories générées en JS -->
      </div>
    </section>

    <section class="results hidden" id="results">
      <div class="results-head">
        <strong id="count">0 résultat</strong>
        <span class="muted" id="hint">Tape pour filtrer…</span>
      </div>
      <div class="list" id="list"></div>
    </section>
  </div>

  <!-- Drawer détail -->
  <aside class="drawer" id="drawer" aria-hidden="true">
    <header>
      <div class="title">
        <img id="d-logo" alt="">
        <div>
          <div id="d-name" style="font-weight:700"></div>
          <div id="d-cat" class="muted" style="font-size:12px"></div>
        </div>
      </div>
    </header>
    <div class="body">
      <a id="d-call" class="btn btn-call">
  <i class="ph ph-phone"></i>

  <div class="call-text">
    <span class="call-label">Appeler</span>
    <span id="d-tel"></span>
  </div>
</a>
      <div class="kv"><b>Type</b><span id="d-type"></span></div>
      <div class="kv"><b>Assisteur</b><span id="d-assist"></span></div>
      <div class="kv" id="d-extra-wrap"><b>Informations</b><span id="d-extra"></span></div>
      <div class="kv"><b>Disponibilité</b><span>24h/24 · 7j/7</span></div>
      <div>
        <button id="d-fav" class="btn btn-ghost"><i class="ph ph-star"></i> Ajouter aux favoris</button>
        <button id="d-close" class="btn btn-ghost"><i class="ph ph-x"></i> Fermer</button>
      </div>
    </div>
  </aside>

  <script>
    // 1) Définition des catégories visibles
    const CATEGORIES = [

  { key:'VL', label:'VL', sub:'Véhicule léger', icon:'ph-car' },

  { key:'PL', label:'PL', sub:'Poids lourd', icon:'ph-truck' },

  { key:'MOTO', label:'MOTO', sub:'Deux-roues', icon:'ph-motorcycle' },

  { key:'LOCATION', label:'LOCATION', sub:'Location', icon:'ph-key' },

  { key:'ASSURANCE', label:'ASSURANCE', sub:'Assurance', icon:'ph-shield' }

];

let DATA = [];
let current = [];

// ELEMENTS

const cats = document.getElementById('cats');

const listEl = document.getElementById('list');

const resultsEl = document.getElementById('results');

const q = document.getElementById('q');

const count = document.getElementById('count');

const hint = document.getElementById('hint');

const drawer = document.getElementById('drawer');

const dName = document.getElementById('d-name');

const dCat = document.getElementById('d-cat');

const dTel = document.getElementById('d-tel');

const dCall = document.getElementById('d-call');

const dAssist = document.getElementById('d-assist');

const dType = document.getElementById('d-type');

const dExtra = document.getElementById('d-extra');

const dExtraWrap = document.getElementById('d-extra-wrap');

const dLogo = document.getElementById('d-logo');

const dFav = document.getElementById('d-fav');

// FAVORIS

const KEY = 'adrah:favs';

const getFavs = () =>
JSON.parse(localStorage.getItem(KEY) || '[]');

const saveFavs = arr =>
localStorage.setItem(KEY, JSON.stringify(arr));

const isFav = item =>
getFavs().some(x =>
x.name === item.name &&
(x.phone || '') === (item.phone || '')
);

const toggleFav = item => {

  const favs = getFavs();

  const idx = favs.findIndex(x =>
    x.name === item.name &&
    (x.phone || '') === (item.phone || '')
  );

  if(idx > -1){

    favs.splice(idx,1);

  } else {

    favs.push(item);

  }

  saveFavs(favs);

};

// CATEGORIES

cats.innerHTML = CATEGORIES.map(c => `

<button class="card" data-cat="${c.key}">

  <i class="ph ${c.icon}"></i>

  <div>

    <h3>${c.label}</h3>

    <span>${c.sub}</span>

  </div>

  <span class="badge">24/7</span>

</button>

`).join('');

// CHARGEMENT JSON

fetch('data.json')

.then(r => r.json())

.then(json => {

  DATA = json.map(x => ({

    type: x.type || '',

    name: x.nom || x.name || '',

    assistant: x.assisteur || x.assistant || '',

    phone: x.telephone || x.phone || '',

    category: x.categorie || x.category || '',

    extra: x.extra || '',

    logo: x.logo || ''

  }));

})

.catch(err => {

  console.log('Erreur JSON', err);

});

// RECHERCHE

function matches(item, needle){

  const hay = [

    item.name,

    item.type,

    item.category,

    item.assistant,

    item.phone,

    item.extra

  ].join(' ').toLowerCase();

  return hay.includes(needle.toLowerCase());

}

function render(rows){

  current = rows;

  if(rows.length === 0){

    resultsEl.classList.add('hidden');

    return;

  }

  resultsEl.classList.remove('hidden');

  count.textContent =

    rows.length +

    (rows.length > 1 ? ' résultats' : ' résultat');

  listEl.innerHTML = rows.map((r,i)=>`

<div class="row" data-i="${i}">

  <div class="meta">

    <div class="title">${r.name}</div>

    <div class="sub">

      ${r.category || r.type}

      ·

      ${r.assistant || ''}

    </div>

  </div>

  <div class="actions">

  <a
  class="btn btn-call"
  href="tel:${(r.phone || '').replace(/\s+/g,'')}">

    <i class="ph ph-phone"></i>

  </a>

  <button
  class="btn btn-ghost ${isFav(r) ? 'on' : ''}"
  data-fav="${i}">

    <i class="ph ph-star"></i>

  </button>

</div>

`).join('');

}

function search(text){

  const n = text.trim();

  if(!n){

    resultsEl.classList.add('hidden');

    return;

  }

  const rows = DATA
  .filter(d => matches(d,n))
  .slice(0,300);

  hint.textContent = 'Filtré par « ' + n + ' »';

  render(rows);

}

q.addEventListener('input', e => {

  search(e.target.value);

});

// CLICK CATEGORIES

cats.addEventListener('click', e => {

  const btn = e.target.closest('[data-cat]');

  if(!btn) return;

  const key = btn.dataset.cat;

  const rows = DATA.filter(d =>

    d.category === key ||

    d.type === key

  ).slice(0,300);

  hint.textContent = key;

  render(rows);

  window.scrollTo({

    top: resultsEl.offsetTop - 10,

    behavior:'smooth'

  });

});

// DRAWER

function openDetail(item){

  dName.textContent = item.name;

  dCat.textContent =

    item.category ||

    item.type ||

    'Contact';

  dTel.textContent = item.phone || '—';

  dCall.href = item.phone

  ? 'tel:' + item.phone.replace(/\s+/g,'')

  : '#';

  dAssist.textContent = item.assistant || '—';

  dType.textContent = item.type || '—';

  if(item.extra){

    dExtra.textContent = item.extra;

    dExtraWrap.style.display = 'block';

  } else {

    dExtraWrap.style.display = 'none';

  }

  dLogo.src = item.logo ||

  'https://upload.wikimedia.org/wikipedia/commons/a/ac/No_image_available.svg';

  dFav.classList.toggle('on', isFav(item));

  drawer.classList.add('show');

}

// FERMER DRAWER

document
.getElementById('d-close')
.addEventListener('click', ()=>{

  drawer.classList.remove('show');

});

// CLICK RESULTATS

listEl.addEventListener('click', e => {

  const fav = e.target.closest('[data-fav]');

  if(fav){

    e.preventDefault();

    e.stopPropagation();

    const i = fav.dataset.fav;

    toggleFav(current[i]);

    fav.classList.toggle('on');

    return;

  }

  const row = e.target.closest('.row');

  if(!row) return;

  const index = row.dataset.i;

  openDetail(current[index]);

});

// FAVORIS

dFav.addEventListener('click', ()=>{

  const item = {

    name:dName.textContent,

    phone:dTel.textContent

  };

  toggleFav(item);

  dFav.classList.toggle(

    'on',

    isFav(item)

  );

});

// FERMER SI CLICK EXTERIEUR

window.addEventListener('click', e => {

  if(e.target === drawer){

    drawer.classList.remove('show');

  }

});

</script>
</body>
</html>
