<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ADRAH</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">

<style>
body{margin:0;font-family:Inter;background:#000;color:#fff}
.app{max-width:560px;margin:auto;padding:18px}

.logo{text-align:center;margin-bottom:10px}
.logo img{width:85%;max-width:380px}

.search{margin:15px 0}
.search input{
width:100%;padding:14px;border-radius:14px;
border:1px solid #222;background:#111;color:#fff;
text-align:center;outline:none
}

.grid{display:grid;gap:12px}
.card{
display:flex;justify-content:space-between;
padding:16px;border-radius:16px;
background:#111;border:1px solid #222;
cursor:pointer
}
.card h3{margin:0;color:#1e5eff}
.card span{font-size:12px;color:#aaa}

.results{margin-top:15px}
.row{
display:flex;justify-content:space-between;
padding:12px;border-bottom:1px solid #222
}
.title{font-weight:700}
.sub{font-size:12px;color:#aaa}

.btn{
background:#ff2d2d;color:#000;
border:none;padding:8px 12px;
border-radius:10px;text-decoration:none
}

.drawer{
position:fixed;top:0;right:0;
width:90%;max-width:380px;height:100%;
background:#0c0c0c;
transform:translateX(100%);
transition:.25s;
padding:18px;z-index:999
}
.drawer.show{transform:translateX(0)}

.kv{background:#111;padding:10px;border-radius:12px;margin-top:10px}

.hidden{display:none}
</style>
</head>

<body>

<div class="app">

<div class="logo">
<img src="logo.jpg">
<div style="font-size:12px;color:#aaa">Dépannage • Remorquage</div>
</div>

<div class="search">
<input id="q" placeholder="Rechercher...">
</div>

<div class="grid" id="cats"></div>

<div class="results hidden" id="results">
<div id="list"></div>
</div>

</div>

<!-- DRAWER -->
<div class="drawer" id="drawer">
<h3 id="d-name"></h3>
<div id="d-cat"></div>
<div class="kv" id="d-phone"></div>
<a id="d-call" class="btn">Appeler</a>
</div>

<script>

/* DATA */
let DATA = [];
let current = [];

const cats = document.getElementById("cats");
const list = document.getElementById("list");
const results = document.getElementById("results");
const q = document.getElementById("q");
const drawer = document.getElementById("drawer");

/* CATEGORIES */
const CATEGORIES = [
  { key:"VL", label:"VL", sub:"Léger" },
  { key:"PL", label:"PL", sub:"Poids lourd" },
  { key:"MOTO", label:"MOTO", sub:"2 roues" }
];

cats.innerHTML = CATEGORIES.map(c => `
  <div class="card" data-cat="${c.key}">
    <div>
      <h3>${c.label}</h3>
      <span>${c.sub}</span>
    </div>
  </div>
`).join("");

/* SAFE LOAD DATA */
fetch("data.json")
  .then(r => r.json())
  .then(j => {
    DATA = Array.isArray(j) ? j : [];
  })
  .catch(() => {
    DATA = [];
  });

/* SEARCH */
q.addEventListener("input", e => {
  const v = (e.target.value || "").toLowerCase().trim();

  if(!v){
    results.classList.add("hidden");
    return;
  }

  if(!DATA.length) return;

  current = DATA.filter(x =>
    (x.name||"").toLowerCase().includes(v) ||
    (x.category||"").toLowerCase().includes(v) ||
    (x.type||"").toLowerCase().includes(v)
  );

  render();
});

/* RENDER */
function render(){
  if(!list || !results) return;

  results.classList.remove("hidden");

  list.innerHTML = current.map((x,i)=>`
    <div class="row" data-i="${i}">
      <div>
        <div class="title">${x.name || ""}</div>
        <div class="sub">${x.category || ""}</div>
      </div>

      <a class="btn"
        href="tel:${(x.phone || "").replace(/\s+/g,"")}">
        Appel
      </a>
    </div>
  `).join("");
}

/* CLICK CATEGORY */
cats.addEventListener("click", e => {
  const el = e.target.closest(".card");
  if(!el) return;

  const key = el.dataset.cat;

  current = (DATA || []).filter(x =>
    x.category === key || x.type === key
  );

  render();
});

/* CLICK RESULT */
list.addEventListener("click", e => {
  const row = e.target.closest(".row");
  if(!row) return;

  const item = current[row.dataset.i];
  if(!item) return;

  const dName = document.getElementById("d-name");
  const dCat = document.getElementById("d-cat");
  const dTel = document.getElementById("d-tel");
  const dCall = document.getElementById("d-call");

  if(dName) dName.textContent = item.name || "";
  if(dCat) dCat.textContent = item.category || item.type || "";
  if(dTel) dTel.textContent = item.phone || "—";

  if(dCall){
    dCall.href = "tel:" + (item.phone || "").replace(/\s+/g,"");
  }

  drawer.classList.add("show");
});

/* CLOSE DRAWER */
drawer.addEventListener("click", e => {
  if(e.target === drawer){
    drawer.classList.remove("show");
  }
});
  
</script>
</body>
</html>
