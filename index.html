<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ADRAH — Assistance • Dépannage • Remorquage</title>

  <!-- Police et icônes -->
  <link rel="preconnect" href="[fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin>
  <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap)" rel="stylesheet">
  <link rel="stylesheet" href="[unpkg.com](https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css)">

  <style>
    :root{
  --bg:#05070b;
  --panel:rgba(18,20,28,.88);
  --panel-2:rgba(28,32,42,.92);
  --muted:#9ca3b5;
  --text:#ffffff;
  --accent:#e01919;
  --accent-2:#ff3434;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
  margin:0;
  color:var(--text);
  font-family:Inter,system-ui,sans-serif;

  background:
  linear-gradient(rgba(0,0,0,.78),rgba(0,0,0,.88)),
  url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1400&auto=format&fit=crop');

  background-size:cover;
  background-position:center;
  background-attachment:fixed;

  -webkit-font-smoothing:antialiased;
    }
    .app{max-width:1160px;margin:auto;padding:20px 16px 28px}
    header{
      display:flex;align-items:center;gap:16px;margin-bottom:16px
    }
    .brand{
      display:flex;align-items:center;gap:14px
    }
    .brand-logo{
  width:78px;
  height:78px;
  border-radius:22px;

  background:
  linear-gradient(145deg,#141824,#0a0d15);

  border:1px solid rgba(255,255,255,.08);

  box-shadow:
  0 10px 30px rgba(0,0,0,.45),
  inset 0 1px 0 rgba(255,255,255,.05);
    }
    .brand-logo::after{
      content:"";position:absolute;inset:-20% -50% auto;height:160%;
      background:conic-gradient(from 200deg at 50% 50%, transparent 0 20%, rgba(255,255,255,.06) 20% 40%, transparent 40% 100%);
      transform:rotate(-10deg)
    }
    .brand-title{line-height:1}
    .brand-title h1{margin:0;font-size:26px;letter-spacing:.6px}
    .brand-title small{display:block;color:var(--muted);margin-top:2px}

    /* Barre recherche */
    .search{
      display:flex;gap:10px;margin:14px 0 24px
    }
    .search input{
      flex:1;background:var(--panel);border:1px solid #2a2f37;color:var(--text);
      height:48px;border-radius:12px;padding:0 14px 0 44px;font-size:15px;
      outline:0;box-shadow:inset 0 0 0 1px rgba(0,0,0,.15)
    }
    .search .ico{
      position:relative
    }
    .search .ico i{
      position:absolute;left:14px;top:50%;translate:0 -50%;color:var(--muted)
    }
    .quick-tags{
      display:flex;flex-wrap:wrap;gap:8px;margin-top:-6px;margin-bottom:16px
    }
    .chip{
      padding:6px 10px;border-radius:20px;background:#20242b;color:#c6cad4;
      border:1px solid #2a2f37;font-size:12px;cursor:pointer;user-select:none
    }
    .chip:hover{border-color:#3a3f48}

    /* Grille catégories */
    .grid{
      display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px
    }
    @media (max-width:960px){.grid{grid-template-columns:repeat(3,1fr)}}
    @media (max-width:640px){.grid{grid-template-columns:repeat(2,1fr)}}

    .card{
  background:
  linear-gradient(rgba(12,14,20,.82),rgba(10,12,18,.92)),
  url('https://images.unsplash.com/photo-1511919884226-fd3cad34687c?q=80&w=1200&auto=format&fit=crop');

  background-size:cover;

  border:1px solid rgba(255,255,255,.08);

  border-radius:22px;

  padding:18px;

  min-height:120px;

  position:relative;

  overflow:hidden;

  transition:.2s;
    }

.card:hover{
  transform:translateY(-3px);
  border-color:#ff2d2d;
  box-shadow:0 12px 30px rgba(0,0,0,.4);
    }

.card h3{
  font-size:28px;
  color:white;
    }

.card span{
  color:#d4d8e2;
  font-size:15px;
    }

.card i{
  font-size:38px;
  color:#ff2d2d;
    }

    /* Résultats */
    .results{
      margin-top:18px;background:var(--panel);border:1px solid #2a2f37;border-radius:16px;overflow:hidden
    }
    .results-head{
      display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#191c22;border-bottom:1px solid #2a2f37
    }
    .results-head strong{font-size:13px;color:#cfd5e2}
    .list{display:flex;flex-direction:column}
    .row{
      display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;
      padding:12px 14px;border-bottom:1px solid #262a33
    }
    .row:last-child{border-bottom:none}
    .row .meta{display:flex;flex-direction:column;gap:2px}
    .row .title{font-weight:600}
    .row .sub{color:var(--muted);font-size:12px}
    .actions{display:flex;gap:8px}
    .btn{
      display:inline-flex;align-items:center;gap:8px;border-radius:999px;border:1px solid transparent;
      height:38px;padding:0 14px;font-weight:600;cursor:pointer;
    }
    .btn-call{
  background:linear-gradient(180deg,var(--accent),var(--accent-2));
  color:white;
  border-radius:18px;

  height:48px;

  font-size:16px;

  box-shadow:
  0 10px 20px rgba(255,0,0,.28);
    }

.app{
  backdrop-filter:blur(6px);
    }

.results{
  background:rgba(16,18,26,.88);
  border-radius:22px;
  overflow:hidden;
}

.row{
  background:rgba(255,255,255,.02);
}

.results-head{
  background:rgba(255,255,255,.03);
}

.search input{
  background:rgba(20,22,30,.92);
  border:1px solid rgba(255,255,255,.08);

  border-radius:18px;

  height:58px;

  font-size:17px;
    }

.search input:focus{
  border-color:#ff2d2d;
  box-shadow:0 0 0 4px rgba(255,0,0,.12);
    }
    /* Drawer détail */
    .drawer{
      position:fixed;right:0;top:0;height:100%;width:min(420px,92vw);
      background:linear-gradient(180deg,#15181d,#111317);border-left:1px solid #2b2f39;
      translate:100% 0;transition:translate .2s ease;z-index:40;display:flex;flex-direction:column
    }
    .drawer.show{translate:0 0}
    .drawer header{padding:14px 14px;border-bottom:1px solid #2b2f39}
    .drawer .title{display:flex;align-items:center;gap:10px}
    .drawer .title img{width:36px;height:36px;border-radius:8px;border:1px solid #2a2f37;background:#222}
    .drawer .body{padding:14px;display:flex;flex-direction:column;gap:12px;overflow:auto}
    .kv{background:#1b1f26;border:1px solid #2a2f37;border-radius:12px;padding:10px}
    .kv b{display:block;font-size:11px;color:#a8b0c0;margin-bottom:4px}
    .kv span{font-size:14px}

    /* Footer features */
    .features{
      display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:18px 0
    }
    @media (max-width:900px){.features{grid-template-columns:repeat(2,1fr)}}
    .feature{
      background:linear-gradient(180deg,#171a1f,#14171b);
      border:1px solid #2a2f37;border-radius:14px;padding:12px;display:flex;gap:10px;align-items:center
    }
    .feature i{font-size:22px;color:#ff6f61}
    .muted{color:var(--muted)}
    .hidden{display:none}
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="brand-logo" aria-hidden="true"></div>
        <div class="brand-title">
          <h1>ADRAH</h1>
          <small>Assistance • Dépannage • Remorquage — 24h/24 · 7j/7</small>
        </div>
      </div>
    </header>

    <div class="search">
      <div class="ico"><i class="ph ph-magnifying-glass"></i></div>
      <input id="q" type="search" placeholder="Rechercher une assistance, assurance, marque…" autocomplete="off" />
    </div>

    <section>
      <h2 style="margin:0 0 10px 2px;font-size:14px;color:#bfc6d4;letter-spacing:.3px">CATÉGORIES</h2>
      <div class="grid" id="cats">
        <!-- Catégories générées en JS -->
      </div>
    </section>

    <section class="results hidden" id="results">
      <div class="results-head">
        <strong id="count">0 résultat</strong>
        <span class="muted" id="hint">Tape pour filtrer…</span>
      </div>
      <div class="list" id="list"></div>
    </section>
  </div>

  <!-- Drawer détail -->
  <aside class="drawer" id="drawer" aria-hidden="true">
    <header>
      <div class="title">
        <img id="d-logo" alt="">
        <div>
          <div id="d-name" style="font-weight:700"></div>
          <div id="d-cat" class="muted" style="font-size:12px"></div>
        </div>
      </div>
    </header>
    <div class="body">
      <button id="d-call" class="btn btn-call"><i class="ph ph-phone"></i> Appeler <span id="d-tel"></span></button>
      <div class="kv"><b>Type</b><span id="d-type"></span></div>
      <div class="kv"><b>Assisteur</b><span id="d-assist"></span></div>
      <div class="kv" id="d-extra-wrap"><b>Informations</b><span id="d-extra"></span></div>
      <div class="kv"><b>Disponibilité</b><span>24h/24 · 7j/7</span></div>
      <div>
        <button id="d-fav" class="btn btn-ghost"><i class="ph ph-star"></i> Ajouter aux favoris</button>
        <button id="d-close" class="btn btn-ghost"><i class="ph ph-x"></i> Fermer</button>
      </div>
    </div>
  </aside>

  <script>
    // 1) Définition des catégories visibles
    const CATEGORIES = [

  { key:'VL', label:'VL', sub:'Véhicule léger', icon:'ph-car' },

  { key:'PL', label:'PL', sub:'Poids lourd', icon:'ph-truck' },

  { key:'MOTO', label:'MOTO', sub:'Deux-roues', icon:'ph-motorcycle' },

  { key:'LOCATION', label:'LOCATION', sub:'Location', icon:'ph-key' },

  { key:'ASSURANCE', label:'ASSURANCE', sub:'Assurance', icon:'ph-shield' }

];

let DATA = [];

// Chargement automatique du JSON

fetch('data.json')

.then(r => r.json())

.then(json => {

  DATA = json.map(x => ({

    type: x.type || x.categorie || '',

    name: x.nom || x.name || '',

    assistant: x.assisteur || x.assistant || '',

    phone: x.telephone || x.phone || '',

    category: x.categorie || x.category || '',

    extra: x.extra || '',

    logo: x.logo || ''

  }));

});

// 3) Rendu catégories

const cats = document.getElementById('cats');

cats.innerHTML = CATEGORIES.map(c => `

  <button class="card" data-cat="${c.key}">

    <i class="ph ${c.icon}"></i>

    <div>

      <h3>${c.label}</h3>

      <span>${c.sub}</span>

    </div>

    <span class="badge">24/7</span>

  </button>

`).join('');

// 4) Recherche + filtrage

const listEl = document.getElementById('list');

const resultsEl = document.getElementById('results');

const q = document.getElementById('q');

const count = document.getElementById('count');

const hint = document.getElementById('hint');

let current = [];

function render(rows){

  current = rows;

  if(rows.length===0){

    resultsEl.classList.add('hidden');

    return;

  }

  resultsEl.classList.remove('hidden');

  count.textContent =

    rows.length +

    (rows.length>1 ? ' résultats' : ' résultat');

  listEl.innerHTML = rows.map((r,i)=>`

    <div class="row" data-i="${i}">

      <div class="meta">

        <div class="title">

          ${r.name}

        </div>

        <div class="sub">

          ${r.category || r.type}

          ·

          ${r.assistant || ''}

        </div>

      </div>

      <div class="actions">

        <a class="btn btn-call"

        href="tel:${(r.phone||'').replace(/\s+/g,'')}">

          <i class="ph ph-phone"></i>

          ${r.phone||'—'}

        </a>

        <button

        class="btn btn-ghost fav ${isFav(r)?'on':''}"

        data-fav="${i}">

          <i class="ph ph-star"></i>

        </button>

        <button

        class="btn btn-ghost"

        data-detail="${i}">

          <i class="ph ph-info"></i>

        </button>

      </div>

    </div>

  `).join('');

}

function matches(item, needle){

  const hay = [

    item.name,

    item.type,

    item.category,

    item.assistant,

    item.phone,

    item.extra

  ].join(' ').toLowerCase();

  return hay.includes(

    needle.toLowerCase()

  );

}

function search(text){

  const n = text.trim();

  if(!n){

    resultsEl.classList.add('hidden');

    return;

  }

  const rows = DATA

  .filter(d=>matches(d,n))

  .slice(0,300);

  hint.textContent =

    'Filtré par « '+n+' »';

  render(rows);

}

q.addEventListener('input',

e=> search(e.target.value)

);

// Quick tags

document

.getElementById('quickTags')

.addEventListener('click', e=>{

  const tag =

  e.target?.dataset?.tag;

  if(!tag) return;

  q.value = tag;

  search(tag);

});

// Catégories

cats.addEventListener('click', e=>{

  const btn =

  e.target.closest('[data-cat]');

  if(!btn) return;

  const key = btn.dataset.cat;

  const rows = DATA.filter(d =>

    (d.category===key || d.type===key)

  ).slice(0,300);

  hint.textContent = key;

  render(rows);

  window.scrollTo({

    top: resultsEl.offsetTop - 10,

    behavior:'smooth'

  });

});

// Drawer détail

const drawer = document.getElementById('drawer');

const dName = document.getElementById('d-name');

const dCat = document.getElementById('d-cat');

const dTel = document.getElementById('d-tel');

const dCall = document.getElementById('d-call');

const dAssist = document.getElementById('d-assist');

const dType = document.getElementById('d-type');

const dExtra = document.getElementById('d-extra');

const dExtraWrap = document.getElementById('d-extra-wrap');

const dLogo = document.getElementById('d-logo');

const dFav = document.getElementById('d-fav');

function openDetail(item){

  dName.textContent = item.name;

  dCat.textContent =

    item.category ||

    item.type ||

    'Contact';

  dTel.textContent =

    item.phone || '—';

  dCall.href =

    item.phone

    ? 'tel:'+item.phone.replace(/\s+/g,'')

    : '#';

  dAssist.textContent =

    item.assistant || '—';

  dType.textContent =

    item.type || '—';

  if(item.extra){

    dExtra.textContent =

      item.extra;

    dExtraWrap.style.display='block';

  } else {

    dExtraWrap.style.display='none';

  }

  dLogo.src =

    item.logo ||

    'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==';

  dFav.classList.toggle(

    'on',

    isFav(item)

  );

  drawer.classList.add('show');

}

document

.getElementById('d-close')

.addEventListener('click', ()=>{

  drawer.classList.remove('show');

});

// Délégation

listEl.addEventListener('click', e=>{

  const i =

  e.target.closest('[data-detail]')

  ?.dataset?.detail;

  if(i!=null){

    openDetail(current[i]);

    return;

  }

  const f =

  e.target.closest('[data-fav]')

  ?.dataset?.fav;

  if(f!=null){

    toggleFav(current[f]);

    e.target.closest('button')

    .classList.toggle('on');

  }

});

// Favoris

const KEY='adrah:favs';

const getFavs=()=>

JSON.parse(

localStorage.getItem(KEY)||'[]'

);

const saveFavs=(arr)=>

localStorage.setItem(

KEY,

JSON.stringify(arr)

);

const isFav=(item)=>

getFavs().some(x=>

x.name===item.name &&

(x.phone||'')===(item.phone||'')

);

const toggleFav=(item)=>{

  const favs=getFavs();

  const idx=favs.findIndex(x=>

    x.name===item.name &&

    (x.phone||'')===(item.phone||'')

  );

  if(idx>-1){

    favs.splice(idx,1);

  } else {

    favs.push(item);

  }

  saveFavs(favs);

};

dFav.addEventListener('click', ()=>{

  toggleFav({

    name:dName.textContent,

    phone:dTel.textContent,

    category:dCat.textContent,

    assistant:dAssist.textContent,

    type:dType.textContent,

    extra:dExtra.textContent

  });

});

</script>
</body>
</html>
