<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ADRAH</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#000;
  color:#fff;
}

.app{max-width:560px;margin:auto;padding:20px}

.search input{
  width:100%;
  height:60px;
  border-radius:16px;
  border:1px solid #222;
  background:#111;
  color:#fff;
  text-align:center;
  font-size:16px;
}

.card{
  padding:18px;
  margin-top:10px;
  background:#111;
  border-radius:16px;
  border:1px solid #222;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.row{
  padding:14px;
  border-bottom:1px solid #222;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.hidden{display:none}

.btn{
  background:red;
  border:none;
  color:#fff;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>
<div class="app">

<h2>ADRAH</h2>

<div class="search">
<input id="q" placeholder="Rechercher..." />
</div>

<div id="cats"></div>

<div id="results" class="hidden">
  <div id="list"></div>
</div>

</div>

<script>
let DATA = [];
let current = [];

const q = document.getElementById('q');
const list = document.getElementById('list');
const results = document.getElementById('results');
const cats = document.getElementById('cats');

/* ---------------- CATEGORIES ---------------- */
const CATEGORIES = [
{key:"VL",label:"VL"},
{key:"PL",label:"PL"},
{key:"MOTO",label:"MOTO"},
{key:"LOCATION",label:"LOCATION"},
{key:"ASSURANCE",label:"ASSURANCE"}
];

cats.innerHTML = CATEGORIES.map(c=>`
<div class="card" data-cat="${c.key}">
<b>${c.label}</b>
</div>
`).join('');

/* ---------------- LOAD JSON ---------------- */
fetch('data.json')
.then(r=>{
  if(!r.ok) throw new Error("JSON introuvable");
  return r.json();
})
.then(json=>{
  DATA = json.map(x=>({
    name:x.nom||"",
    phone:x.telephone||"",
    category:x.categorie||"",
    type:x.type||"",
    assistant:x.assisteur||""
  }));
  console.log("DATA OK :",DATA.length);
})
.catch(err=>{
  console.error("Erreur JSON :",err);
});

/* ---------------- SEARCH ---------------- */
function search(val){

  const n = val.trim().toLowerCase();

  if(!n){
    results.classList.add('hidden');
    return;
  }

  if(!DATA.length) return;

  const rows = DATA.filter(d=>{
    const hay = (d.name+" "+d.phone+" "+d.category+" "+d.type+" "+d.assistant).toLowerCase();
    return hay.includes(n);
  });

  render(rows);
}

/* ---------------- RENDER ---------------- */
function render(rows){

  current = rows;

  if(!rows.length){
    results.classList.add('hidden');
    return;
  }

  results.classList.remove('hidden');

  list.innerHTML = rows.map(r=>`
    <div class="row">
      <div>
        <b>${r.name}</b><br>
        <small>${r.category}</small>
      </div>

      <a class="btn" href="tel:${(r.phone||"").replace(/\s/g,'')}">
        Appeler
      </a>
    </div>
  `).join('');
}

/* ---------------- EVENTS ---------------- */
q.addEventListener('input',e=>{
  search(e.target.value);
});

cats.addEventListener('click',e=>{
  const c = e.target.closest('[data-cat]');
  if(!c || !DATA.length) return;

  const key = c.dataset.cat;

  const rows = DATA.filter(d=>d.category===key || d.type===key);

  render(rows);
});
</script>

</body>
</html>
