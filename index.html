  <style>
    :root{
  --bg:#05070b;
  --panel:rgba(18,20,28,.88);
  --panel-2:rgba(28,32,42,.92);
  --muted:#9ca3b5;
  --text:#ffffff;
  --accent:#e01919;
  --accent-2:#ff3434;
}

*{
  box-sizing:border-box;
}

html,body{
  height:100%;
}

body{
  margin:0;
  color:var(--text);
  font-family:Inter,system-ui,sans-serif;

  background:#000;

  -webkit-font-smoothing:antialiased;
}

.app{
  max-width:560px;
  margin:auto;
  padding:22px;
}

header{
  margin-bottom:20px;
}

.search{
  display:flex;
  gap:10px;
  margin:24px 0;
  position:relative;
}

.search input{
  width:100%;
  height:64px;

  background:rgba(18,20,28,.92);

  border:1px solid rgba(255,255,255,.08);

  border-radius:20px;

  color:white;

  padding:0 18px;

  font-size:18px;

  text-align:center;

  outline:none;

  backdrop-filter:blur(10px);
}

.search input::placeholder{
  color:#8f97aa;
  text-align:center;
}
    
.search input:focus{

  border-color:rgba(255,255,255,.08);

  box-shadow:none;  
}
    
button,
input,
a{
  outline:none;
  -webkit-tap-highlight-color:transparent;
}

button:focus,
input:focus,
a:focus{
  outline:none;
  box-shadow:none;
}
    
.search .ico{
  position:absolute;
  left:18px;
  top:50%;
  transform:translateY(-50%);
}

.search .ico i{
  font-size:22px;
  color:#b7bcc8;
}

.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:16px;
}

.card{
  display:flex;
  align-items:center;
  gap:18px;

  width:100%;
  min-width:0;

  min-height:110px;

  padding:20px;

  border-radius:24px;

  border:1px solid rgba(255,255,255,.08);

  overflow:hidden;

  position:relative;

  background:
  linear-gradient(rgba(0,0,0,.72),rgba(0,0,0,.78)),
  url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1200&auto=format&fit=crop');

  background-size:cover;
  background-position:center;

  backdrop-filter:blur(8px);

  transition:.2s;
}

.card:hover{

  transform:translateY(-3px);

  border-color:rgba(255,255,255,.08);

  box-shadow:
  0 12px 30px rgba(0,0,0,.45);
}

.card i{
  font-size:40px;
  color:#1e5eff;
}

.card h3{
  margin:0;
  font-size:34px;
  font-weight:800;
  color:#1e5eff;
}

.card span{
  color:#e0e3ea;
  font-size:16px;
}
    
.card::before{

  content:"";

  position:absolute;

  inset:0;

  background:

  linear-gradient(

    180deg,

    rgba(255,255,255,.04),

    rgba(255,255,255,0)

  );
  pointer-events:none;  
 }
    
.meta{

  flex:1;

  min-width:0;
}    
    
 .card div{
  min-width:0;
}

.card h3,
.card span{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
    
.card span{
  display:block;
}    
    
.badge{
  position:absolute;

  top:18px;
  right:18px;

  background:rgba(255,255,255,.08);

  border:1px solid rgba(255,255,255,.1);

  color:white;

  border-radius:999px;

  padding:6px 14px;

  font-size:14px;
}

.results{
  margin-top:24px;

  background:rgba(14,16,22,.9);

  border:1px solid rgba(255,255,255,.06);

  border-radius:24px;

  overflow:hidden;

  backdrop-filter:blur(12px);
}

.results-head{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:16px;

  border-bottom:1px solid rgba(255,255,255,.05);
}

.results-head strong{
  font-size:15px;
}

.list{
  display:flex;
  flex-direction:column;
}

.row{

  display:flex;

  align-items:center;

  justify-content:space-between;

  gap:12px;

  padding:18px;

  border-bottom:1px solid rgba(255,255,255,.04);

  overflow:hidden;
}
  
.row:hover{

  background:rgba(255,255,255,.04);

}
.row:last-child{
  border-bottom:none;
}

.row .title{
  font-size:20px;
  font-weight:700;

  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.row .meta{
  min-width:0;
  overflow:hidden;
}
   
.row .sub{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  font-size:14px;
  color:#b7bcc8;
}

.actions{

  display:flex;

  align-items:center;

  gap:10px;

  flex-shrink:0;
}
    
.btn{
  border:none;
  cursor:pointer;

  align-items:center;
  justify-content:center;

}

a{

}

.btn-call{

  linear-gradient(180deg,#ff3434,#d70000);

  0 10px 20px rgba(255,0,0,.25);
}
    
.list .btn-call{

  height:52px;

  border-radius:50%;

}
    
html,body{

}
    
.drawer .body{

  flex-direction:column;
  gap:14px;

.drawer .btn-call{

.drawer .btn-call i{

#d-call .call-label{

#d-tel{

}
         
.call-text{
  flex:1;
  min-width:0;

  display:flex;
  flex-direction:column;
}
        
.btn-ghost{

  width:50px;
  height:50px;

  background:rgba(255,255,255,.06);

}

.btn-ghost.on{

  background:#1e5eff;

}

.drawer{
  position:fixed;

  top:0;
  right:0;

  height:100%;

  linear-gradient(rgba(10,10,10,.94),rgba(10,10,10,.96)),

  transform:translateX(100%);

  transition:.25s;

  z-index:999;

}

.drawer.show{
  transform:translateX(0);
}

.drawer header{
  padding:20px;

  border-bottom:1px solid rgba(255,255,255,.05);
}

.drawer .title{
  display:flex;
  align-items:center;
  gap:14px;
}
    
.drawer .body *{

}
    
.drawer .title img{
  width:52px;
  height:52px;

  border-radius:14px;

  background:#1a1c22;

}
    
.drawer-header{

}

.drawer-back{

  color:white;

  display:flex;

  align-items:center;

  justify-content:center;

  cursor:pointer;

  flex-shrink:0;

  border:1px solid rgba(255,255,255,.08);

  transition:.2s;
}

.drawer-back:hover{

  background:#1e5eff;
}

.drawer-back i{
  font-size:22px;
} 
    
.kv{

  border-radius:18px;

  padding:14px;
}

.kv b{
  display:block;

.kv span{
  font-size:15px;
}

.hidden{
  display:none;
}

.muted{
  color:var(--muted);
}
    
.top-logo{

  align-items:center;

}
    
.main-logo{

.back-top{

.back-top.hidden{

#d-email a{
  color:#1e5eff;

</style>

  <script>   
    // 1) Définition des catégories visibles
    
  const CATEGORIES = [

  { key:'VL', label:'VL', sub:'Véhicule léger', icon:'ph-car' },

  { key:'PL', label:'PL', sub:'Poids lourd', icon:'ph-truck' },

  { key:'MOTO', label:'MOTO', sub:'Deux-roues', icon:'ph-motorcycle' },

  { key:'LOCATION', label:'LOCATION', sub:'Location', icon:'ph-key' },

  { key:'ASSURANCE', label:'ASSURANCE', sub:'Assurance', icon:'ph-shield' },

  { key:'GARAGE', label:'GARAGE', sub:'Partenaires', icon:'ph-wrench' }

];

let DATA = [];
let dataReady = false;    
let current = [];
let categoryOpened = false;

// 🌍 MAP recherche pays
const countryMap = {
  belgique: 'BE',
  belgium: 'BE',
  france: 'FR',
  espagne: 'ES',
  spain: 'ES',
  italie: 'IT',
  italy: 'IT',
  suisse: 'CH',
  switzerland: 'CH',
  uk: 'UK',
  angleterre: 'UK',
  england: 'UK',
  portugal: 'PT',
  paysbas: 'NL',
  'pays-bas': 'NL',
  netherlands: 'NL'
};

// 🌍 Nom affichage pays
const countryNames = {
  BE: 'Belgique',
  FR: 'France',
  ES: 'Espagne',
  IT: 'Italie',
  CH: 'Suisse',
  UK: 'Royaume-Uni',
  PT: 'Portugal',
  NL: 'Pays-Bas'
};

// ELEMENTS

const cats = document.getElementById('cats');

const listEl = document.getElementById('list');

const resultsEl = document.getElementById('results');

const q = document.getElementById('q');

const count = document.getElementById('count');

const hint = document.getElementById('hint');

const drawer = document.getElementById('drawer');

const dName = document.getElementById('d-name');

const dCat = document.getElementById('d-cat');

const dTel = document.getElementById('d-tel');

const dCall = document.getElementById('d-call');

const dAssist = document.getElementById('d-assist');

const dType = document.getElementById('d-type');

const dExtra = document.getElementById('d-extra');

const dExtraWrap = document.getElementById('d-extra-wrap');

const dLogo = document.getElementById('d-logo');
    
const backTop = document.getElementById('backTop');

const dAddressWrap = document.getElementById('d-address-wrap');
    
const dEmailWrap = document.getElementById('d-email-wrap'); 
    
const dServices = document.getElementById('d-services');

const dServicesWrap = document.getElementById('d-services-wrap');   
    
const dCountry = document.getElementById('d-country');

const dAddress = document.getElementById('d-address');

const dEmail = document.getElementById('d-email');

dEmail.addEventListener('click', async () => {

  if(!dEmail.textContent) return;

  try{
    await navigator.clipboard.writeText(dEmail.textContent);
    alert('Email copié');
  }catch(err){
    console.error(err);
  }

});

     
// FAVORIS

const KEY = 'adrah:favs';

const getFavs = () =>
JSON.parse(localStorage.getItem(KEY) || '[]');

const saveFavs = arr =>
localStorage.setItem(KEY, JSON.stringify(arr));

const isFav = item =>
getFavs().some(x =>
x.name === item.name &&
(x.phone || '') === (item.phone || '')
);

const toggleFav = item => {

  const favs = getFavs();

  const idx = favs.findIndex(x =>
    x.name === item.name &&
    (x.phone || '') === (item.phone || '')
  );

  if(idx > -1){

    favs.splice(idx,1);

  } else {

    favs.push(item);

  }

  saveFavs(favs);

};

// CATEGORIES

document.addEventListener("DOMContentLoaded", () => {

  cats.innerHTML = CATEGORIES.map(c => `
    <div class="card" data-cat="${c.key}">
      <i class="ph ${c.icon}"></i>
      <div>
        <h3>${c.label}</h3>
        <span>${c.sub}</span>
      </div>
      <span class="badge">24/7</span>
    </div>
  `).join('');

});

// CHARGEMENT JSON / FETCH

Promise.allSettled([
  fetch('data.json').then(r => r.json()),
  fetch('data2.json').then(r => r.json()),
  fetch('data3.json').then(r => r.json()),
  fetch('garage.json').then(r => r.json())
]).then(results => {

  const arr1 = results[0].status === "fulfilled" ? results[0].value : [];
  const arr2 = results[1].status === "fulfilled" ? results[1].value : [];
  const arr3 = results[2].status === "fulfilled" ? results[2].value : [];
  const arr4 = results[3].status === "fulfilled" ? results[3].value : [];

  DATA = [...arr1, ...arr2, ...arr3, ...arr4].map(x => ({
  type: (x.type || '').toUpperCase(),
  name: x.nom || x.name || '',
  assistant: x.assisteur || x.assistant || '',
  phone: String(x.telephone || x.phone || '')
    .replace(/\s+/g,' ')
    .trim(),

  category: String(x.categorie || x.category || '')
  .trim()
  .toUpperCase(),
  extra: x.extra || '',
  adresse: x.adresse || '',
  email: x.email || '',
  services: x.services || '',
  logo: x.logo || '',

  country: (x.pays || x.country || 'FR').toUpperCase(),

  // 🔥 AJOUT IMPORTANT
  pourboire: x.pourboire === true
}));

  // 🔥 SUPPRESSION DOUBLONS (ICI et PAS dehors)
  DATA = [...new Map(...].values());
  dataReady = true;
   
  DATA.map(item => [
      `${item.name.toLowerCase().trim()}|${item.phone.replace(/\D/g,'')}`,
      item
    ])
  ).values()];

});
// RECHERCHE

function matches(item, needle){

  const hay = [

    item.name,

    item.type,

    item.category,

    item.assistant,

    item.phone,

    item.extra

  ].join(' ').toLowerCase();

  return hay.includes(needle.toLowerCase());

}

function render(rows){

  current = rows;

  if(rows.length === 0){

    resultsEl.classList.add('hidden');

    return;

  }

  resultsEl.classList.remove('hidden');

  count.textContent =

    rows.length +

    (rows.length > 1 ? ' résultats' : ' résultat');

  listEl.innerHTML = rows.map((r,i)=>`

<div class="row" data-i="${i}">

  <div class="meta">

    <div class="title">${r.name}</div>

    <div class="sub">
  ${r.category || r.type}
  ${r.assistant ? `· ${r.assistant}` : ''}
  ${r.country ? `· ${countryNames[r.country] || r.country}` : ''}
</div>

  </div>

  <div class="actions">

    <a
      class="btn btn-call"
      href="tel:${(r.phone || '').replace(/\s+/g,'')}">

      <i class="ph ph-phone"></i>

    </a>

    <button
      class="btn btn-ghost ${isFav(r) ? 'on' : ''}"
      data-fav="${i}">

      <i class="ph ph-star"></i>

    </button>

  </div>

</div>

`).join('');

}

function search(text){

  const n = text.trim().toLowerCase();

  if(!n){
    resultsEl.classList.add('hidden');
    backTop.classList.add('hidden');
    return;
  }

  // Détection pays
  let detectedCountry = null;

  for (const key in countryMap) {
    if (n.includes(key)) {
      detectedCountry = countryMap[key];
      break;
    }
  }

  // Nettoyage texte
  let cleanedText = n;

  for (const key in countryMap) {
    cleanedText = cleanedText.replace(
      new RegExp(`\\b${key}\\b`, 'g'),
      ''
    );
  }

  cleanedText = cleanedText.trim();

  const rows = DATA.filter(d => {

    const hay = [
      d.name,
      d.type,
      d.category,
      d.assistant,
      d.phone,
      d.extra,
      d.country
    ]
    .join(' ')
    .toLowerCase();

    const matchText = cleanedText
      ? hay.includes(cleanedText)
      : true;

    const matchCountry = detectedCountry
      ? d.country.toUpperCase() === detectedCountry
      : true;

    return matchText && matchCountry;
  });

  hint.textContent = detectedCountry
    ? `Pays : ${detectedCountry}`
    : `Recherche globale`;

  render(rows);

  setTimeout(() => {
    resultsEl.scrollIntoView({
      behavior:'smooth',
      block:'start'
    });
  }, 80);

  backTop.classList.add('hidden');
}
  
// IMPORTANT :
// ne jamais afficher le bouton retour pendant une recherche
backTop.classList.add('hidden');  

    
q.addEventListener('input', e => {

  search(e.target.value);

});

// CLICK CATEGORIES

cats.addEventListener('click', e => {

  const btn = e.target.closest('[data-cat]');

  if(!btn) return;

  if(!dataReady) return;

  categoryOpened = true;

  const key = btn.dataset.cat;

  const rows = DATA
  .filter(d =>
    (d.category || '').toUpperCase() === key ||
    (d.type || '').toUpperCase() === key
  )
  .sort((a, b) => {

    const countryA = (a.country || 'FR').toUpperCase();
    const countryB = (b.country || 'FR').toUpperCase();

    if (countryA === 'FR' && countryB !== 'FR') return -1;
    if (countryA !== 'FR' && countryB === 'FR') return 1;

    return a.name.localeCompare(b.name, 'fr', { sensitivity:'base' });

  })
  .slice(0, 2000);

  
  hint.textContent = key;

  render(rows);
  
  categoryOpened = true;
  backTop.classList.remove('hidden');

  resultsEl.scrollIntoView({
    behavior:'smooth',
    block:'start'
  });

});

// BOUTON RETOUR

backTop.addEventListener('click', ()=>{

  resultsEl.classList.add('hidden');

  backTop.classList.add('hidden');

  q.value = '';

  window.scrollTo({
    top:0,
    behavior:'smooth'
  });

});
  
// DRAWER
    
    
function openDetail(item){

  dName.textContent = item.name;

  dCat.textContent =
    item.category ||
    item.type ||
    'Contact';

  dTel.textContent = (item.phone || '—').trim();

  dCall.href = item.phone
    ? 'tel:' + item.phone.replace(/\s+/g,'')
    : '#';

  dAssist.textContent = item.assistant || '—';
  dType.textContent = item.type || '—';

  // 🔥 NOUVEAU
  dCountry.textContent = countryNames[item.country] || item.country || '—';

  if(item.extra){
  dExtra.textContent = item.extra;
  dExtraWrap.style.display = 'block';
} else {
  dExtraWrap.style.display = 'none';
}

// ADRESSE
if(item.adresse){

  dAddress.textContent = item.adresse;
  dAddressWrap.style.display = 'block';

}else{

  dAddressWrap.style.display = 'none';

}

// EMAIL
if(item.email){

  dEmail.textContent = item.email;
  dEmailWrap.style.display = 'block';

}else{

  dEmail.textContent = '';
  dEmailWrap.style.display = 'none';

}
  
if(item.services){

  dServices.textContent = item.services;
  dServicesWrap.style.display = 'block';

}else{

  dServicesWrap.style.display = 'none';

}
  
dLogo.src = item.logo ||
'https://upload.wikimedia.org/wikipedia/commons/a/ac/No_image_available.svg';

drawer.classList.add('show');
}

// CLICK RESULTATS

listEl.addEventListener('click', e => {

  const fav = e.target.closest('[data-fav]');

  if(fav){

    e.preventDefault();

    e.stopPropagation();

    const i = fav.dataset.fav;

    toggleFav(current[i]);

    fav.classList.toggle('on');

    return;

  }

  const row = e.target.closest('.row');

  if(!row) return;

  const index = row.dataset.i;

  openDetail(current[index]);

});

// FERMER SI CLICK EXTERIEUR

window.addEventListener('click', e => {

  if(e.target === drawer){

    drawer.classList.remove('show');

  }

});
