<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>ADRAH — Dépannage</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">

<style>
body{margin:0;font-family:Inter;background:#000;color:#fff}
.app{max-width:560px;margin:auto;padding:20px}

/* LOGO */
.top-logo{text-align:center}
.main-logo{width:85%;max-width:420px}

/* SEARCH */
.search{position:relative;margin:20px 0}
.search input{
width:100%;height:60px;border-radius:18px;
border:1px solid rgba(255,255,255,.1);
background:#111;color:#fff;
text-align:center;font-size:16px
}

/* CATEGORIES */
.grid{display:grid;gap:12px}
.card{
display:flex;align-items:center;gap:14px;
padding:18px;border-radius:18px;
background:#111;border:1px solid rgba(255,255,255,.08);
cursor:pointer
}
.card h3{margin:0;color:#1e5eff}
.card span{font-size:13px;color:#aaa}

/* RESULTS */
.results{margin-top:20px}
.row{
display:flex;justify-content:space-between;
padding:14px;border-bottom:1px solid #222
}
.title{font-weight:700}
.sub{font-size:12px;color:#aaa}

/* BTN */
.btn-call{
background:#ff2d2d;color:#000;
border:none;padding:10px 12px;
border-radius:12px
}

/* BACK */
.back-top{
width:100%;margin-top:15px;
padding:12px;border-radius:12px;
border:1px solid #222;background:#111;color:#fff
}
.hidden{display:none}

/* DRAWER */
.drawer{
position:fixed;top:0;right:0;
width:90%;max-width:420px;height:100%;
background:#0b0b0b;
transform:translateX(100%);
transition:.25s;z-index:999;
padding:20px
}
.drawer.show{transform:translateX(0)}

.kv{margin-top:10px;background:#111;padding:10px;border-radius:12px}
</style>
</head>

<body>

<div class="app">

<!-- LOGO -->
<div class="top-logo">
<img src="logo.jpg" class="main-logo">
</div>

<div style="text-align:center;margin-bottom:10px">
Assistance • Dépannage • Remorquage
</div>

<!-- SEARCH -->
<div class="search">
<input id="q" placeholder="Rechercher...">
</div>

<!-- CATEGORIES -->
<h3 id="secretTrigger">CATÉGORIES</h3>
<div class="grid" id="cats"></div>

<button id="backTop" class="back-top hidden">Retour</button>

<!-- RESULTS -->
<div class="results hidden" id="results">
<div id="list"></div>
</div>

</div>

<!-- DRAWER -->
<div class="drawer" id="drawer">
<h3 id="d-name"></h3>
<div id="d-cat"></div>
<div class="kv" id="d-tel"></div>
<a id="d-call" class="btn-call">Appeler</a>
</div>

<!-- SECRET -->
<div class="drawer" id="secretDrawer">
<h3>MENU SECRET 🔒</h3>
<div id="secretBody"></div>
</div>

<script>

const CATEGORIES=[
{key:"VL",label:"VL",sub:"Léger"},
{key:"PL",label:"PL",sub:"Poids lourd"},
{key:"MOTO",label:"Moto",sub:"2 roues"}
];

let DATA=[];
let current=[];

/* INIT CATS */
cats.innerHTML=CATEGORIES.map(c=>`
<div class="card" data-cat="${c.key}">
<div>
<h3>${c.label}</h3>
<span>${c.sub}</span>
</div>
</div>`).join('');

/* LOAD DATA */
fetch("data.json")
.then(r=>r.json())
.then(j=>DATA=j);

/* SEARCH */
q.oninput=e=>{
const v=e.target.value.toLowerCase();
if(!v){results.classList.add("hidden");return;}

current=DATA.filter(x=>
(x.name||"").toLowerCase().includes(v)||
(x.category||"").toLowerCase().includes(v)
);

render();
};

function render(){
results.classList.remove("hidden");

list.innerHTML=current.map((x,i)=>`
<div class="row" data-i="${i}">
<div>
<div class="title">${x.name}</div>
<div class="sub">${x.category||""}</div>
</div>
<a class="btn-call" href="tel:${x.phone||""}">Appel</a>
</div>
`).join('');
}

/* CLICK CAT */
cats.onclick=e=>{
const c=e.target.closest(".card");
if(!c)return;

const k=c.dataset.cat;
current=DATA.filter(x=>x.category===k||x.type===k);
render();
backTop.classList.remove("hidden");
};

/* BACK */
backTop.onclick=()=>{
results.classList.add("hidden");
backTop.classList.add("hidden");
q.value="";
};

/* SECRET */
let count=0;
secretTrigger.onclick=()=>{
count++;
if(count>=3){
count=0;
secretDrawer.classList.add("show");

secretBody.innerHTML=`
<a href="tel:0600000000">Patron</a><br>
<a href="tel:0711223344">Garage</a>
`;
}
setTimeout(()=>count=0,1000);
};

</script>
</body>
</html>
